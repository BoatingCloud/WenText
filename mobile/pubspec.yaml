name: wenyu_mobile
description: 文雨文档管理系统移动端
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI相关
  google_fonts: ^6.1.0
  flex_color_scheme: 7.0.5
  material_symbols_icons: ^4.0.0

  # 路由
  go_router: ^13.2.0

  # 状态管理
  hooks_riverpod: ^2.4.10
  flutter_hooks: ^0.20.5

  # 网络
  dio: ^5.4.1

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2

  # 工具
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  url_launcher: ^6.2.4
  open_filex: ^4.4.0
  share_plus: ^7.2.2
  image_picker: ^1.0.7
  signature: ^5.4.0

  # 文件预览
  flutter_pdfview: ^1.3.2
  webview_flutter: ^4.4.2
  webview_flutter_android: ^3.12.1
  video_player: ^2.8.1
  audioplayers: ^5.2.1
  flutter_highlight: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - .env
